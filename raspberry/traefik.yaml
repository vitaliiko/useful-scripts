apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: traefik
  namespace: kube-system
spec:
  chart: https://helm.traefik.io/traefik/traefik-20.8.0.tgz
  set:
    global.systemDefaultRegistry: ""
  valuesContent: |-
    image:
      name: traefik
      tag: "v2.9.6"
    service:
      type: LoadBalancer
    ports:
      web:
        port: 80
        expose: true
        exposedPort: 80
      websecure:
        port: 443
        expose: true
        exposedPort: 443
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
